name: Quality Assurance

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  xml-lint:
    name: XML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up zpretty
        uses: gronke/zpretty/.github/actions/zpretty@ros
        with:
          spec: "git+https://github.com/gronke/zpretty@ros"

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: Well-formedness
        id: wellformed
        continue-on-error: true
        run: python scripts/lint_xml.py well-formed

      - name: XSD schema validation
        id: schema
        continue-on-error: true
        run: python scripts/lint_xml.py schema

      - name: zpretty formatting
        id: format
        continue-on-error: true
        run: python scripts/lint_xml.py format

      - name: Verdict
        if: always()
        shell: bash
        run: |
          fail=0
          for outcome in \
            "${{ steps.wellformed.outcome }}" \
            "${{ steps.schema.outcome }}" \
            "${{ steps.format.outcome }}"; do
            [[ "$outcome" != "success" ]] && fail=1
          done
          if (( fail )); then
            echo "::error::One or more XML lint phases reported failures. See the job summary."
            exit 1
          fi
